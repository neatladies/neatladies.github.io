<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neat Ladies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #222;
    }

    .hero {
      padding: 80px 20px;
    }

    .btn {
      background: orange;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      color: white;
    }

    .products {
      padding: 50px;
      background: #1a1a1a;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Neat Ladies</h1>
</header>

<section class="hero">
  <h2>Welcome 💖</h2>
  <p>Simple clean website 🚀</p>
  <a href="#products" class="btn">Shop Now</a>
</section>

<section id="products" class="products">
  <h2>Products 🛍️</h2>

  <div class="card">
    <h3>Product 1</h3>
    <p>$20</p>
  </div>

  <div class="card">
    <h3>Product 2</h3>
    <p>$30</p>
  </div>

</section>

</body>
</html>
