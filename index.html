<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neatladies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 2.5rem;
    }

    .hero {
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff7b54;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff5722;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Neat Ladies</h1>
</header>

<section class="hero">
  <h2>Welcome to My Website 💖</h2>
  <p>This site is live on GitHub Pages 🚀</p>

  <a href="#" class="btn">Shop Now</a>
</section>

<footer>
  © 2026 Neat Ladies | All rights reserved
</footer>

</body>
</html>
<section style="padding:50px;">

  <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-top:30px;">

    <div style="background:white; color:black; padding:15px; border-radius:10px; width:200px;">
      <h3>Product 1</h3>
      <p>$20</p>
      <button>Buy</button>
    </div>

    <div style="background:white; color:black; padding:15px; border-radius:10px; width:200px;">
      <h3>Product 2</h3>
      <p>$25</p>
      <button>Buy</button>
    </div>

  </div>
</section>
